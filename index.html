// ── STYLE HELPERS ─────────────────────────────────────────────────────────────

function col(gap) { return {display:'flex', flexDirection:'column', gap: gap||12}; }
function row(extra) { return Object.assign({display:'flex', alignItems:'center', gap:10}, extra||{}); }
function card(extra) { return Object.assign({background:'#fff', borderRadius:20, padding:18, border:'1px solid #f3f4f6'}, extra||{}); }
function avatar(color) { return {width:36, height:36, borderRadius:'50%', background:color, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:12, flexShrink:0}; }
function btn(bg, color, extra) { return Object.assign({padding:'9px 18px', background:bg, color:color, border:'none', borderRadius:12, cursor:'pointer', fontWeight:600, fontSize:13}, extra||{}); }
function pill(active, ac) { return {padding:'7px 14px', borderRadius:99, fontSize:12, fontWeight:500, border:'1px solid', flexShrink:0, cursor:'pointer', borderColor:active?ac:'#e5e7eb', background:active?ac:'#fff', color:active?'#fff':'#374151'}; }
var INP = {padding:'9px 12px', borderRadius:12, border:'1px solid #e5e7eb', fontSize:13};

// ── PEOPLE TAB ────────────────────────────────────────────────────────────────

function PeopleTab(props) {
  var people = props.people;
  var setPeople = props.setPeople;
  var nameState = useState('');
  var name = nameState[0];
  var setName = nameState[1];

  function add() {
    if (!name.trim()) return;
    setPeople(people.concat([{id:Date.now(), name:name.trim(), color:COLORS[people.length % COLORS.length]}]));
    setName('');
  }

  return h('div', {style:col()},
    h('div', {style:{background:'linear-gradient(135deg,#fef2f2,#fdf4ff)', borderRadius:20, padding:20, border:'1px solid #fecaca'}},
      h('div', {style:{fontWeight:700, color:'#1f2937', marginBottom:12, fontSize:15}}, '🗾 Trip Overview'),
      h('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}},
        [['Destination','Japan 🇯🇵'],['Travelers',people.length+' people'],['Dates','Apr 1–10, 2026'],['Duration','10 days'],['Cities','Tokyo · Hakone · Kyoto · Osaka']].map(function(kv) {
          return h('div', {key:kv[0]},
            h('div', {style:{fontSize:11, color:'#9ca3af'}}, kv[0]),
            h('div', {style:{fontSize:14, fontWeight:600, color:'#1f2937', marginTop:2}}, kv[1])
          );
        })
      )
    ),
    h('div', {style:card()},
      h('div', {style:{fontWeight:700, color:'#1f2937', marginBottom:14, fontSize:15}}, '👥 Travelers (' + people.length + ')'),
      h('div', {style:col(10)},
        people.map(function(p) {
          return h('div', {key:p.id, style:Object.assign(row(), {background:'#f9fafb', borderRadius:14, padding:'10px 14px'})},
            h('div', {style:avatar(p.color)}, p.name.slice(0,2).toUpperCase()),
            h('span', {style:{flex:1, fontWeight:500, color:'#374151'}}, p.name),
            h('button', {onClick:function(){setPeople(people.filter(function(x){return x.id!==p.id;}));}, style:{background:'none', border:'none', cursor:'pointer', color:'#d1d5db', fontSize:18, lineHeight:1}}, '✕')
          );
        })
      ),
      h('div', {style:Object.assign(row(), {marginTop:14})},
        h('input', {value:name, onChange:function(e){setName(e.target.value);}, onKeyDown:function(e){if(e.key==='Enter')add();}, placeholder:'Add traveler name...', style:Object.assign({}, INP, {flex:1})}),
        h('button', {onClick:add, style:btn('#DC2626','#fff')}, '+ Add')
      )
    )
  );
}

// ── EXPENSES TAB ──────────────────────────────────────────────────────────────

function ExpensesTab(props) {
  var expenses = props.expenses;
  var setExpenses = props.setExpenses;
  var people = props.people;

  var showAddState = useState(false);
  var showAdd = showAddState[0]; var setShowAdd = showAddState[1];
  var formState = useState({title:'', amount:'', paidById:people[0]?people[0].id:1, splitWithIds:people.map(function(p){return p.id;}), category:EXP_CATS[0], date:''});
  var form = formState[0]; var setForm = formState[1];

  var total = expenses.reduce(function(s,e){return s+e.amount;}, 0);

  var balances = useMemo(function() {
    var paid = {}, owed = {};
    people.forEach(function(p){paid[p.id]=0; owed[p.id]=0;});
    expenses.forEach(function(e) {
      paid[e.paidById] = (paid[e.paidById]||0) + e.amount;
      var share = e.amount / (e.splitWithIds.length||1);
      e.splitWithIds.forEach(function(id){owed[id]=(owed[id]||0)+share;});
    });
    return people.map(function(p) {
      return Object.assign({}, p, {paid:paid[p.id]||0, owed:owed[p.id]||0, balance:(paid[p.id]||0)-(owed[p.id]||0)});
    });
  }, [expenses, people]);

  function toggleSplit(id) {
    var ids = form.splitWithIds;
    setForm(Object.assign({}, form, {splitWithIds: ids.indexOf(id)>=0 ? ids.filter(function(x){return x!==id;}) : ids.concat([id])}));
  }

  function save() {
    if (!form.title || !form.amount || !form.splitWithIds.length) return;
    setExpenses(expenses.concat([Object.assign({}, form, {id:Date.now(), amount:parseFloat(form.amount)})]));
    setForm({title:'', amount:'', paidById:people[0]?people[0].id:1, splitWithIds:people.map(function(p){return p.id;}), category:EXP_CATS[0], date:''});
    setShowAdd(false);
  }

  return h('div', {style:col(14)},
    // Summary cards
    h('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10}},
      [['Total Spent','$'+total.toLocaleString()], ['Per Person','$'+(people.length?Math.round(total/people.length).toLocaleString():'0')], ['Entries',''+expenses.length]].map(function(kv) {
        return h('div', {key:kv[0], style:card({padding:14, textAlign:'center'})},
          h('div', {style:{fontSize:11, color:'#9ca3af', marginBottom:4}}, kv[0]),
          h('div', {style:{fontSize:20, fontWeight:700, color:'#1f2937'}}, kv[1])
        );
      })
    ),
    // Balances
    h('div', {style:card()},
      h('div', {style:{fontWeight:700, color:'#1f2937', marginBottom:12, fontSize:15}}, '💰 Who Owes What'),
      h('div', {style:col(10)},
        balances.map(function(p) {
          return h('div', {key:p.id, style:row()},
            h('div', {style:avatar(p.color)}, p.name.slice(0,2).toUpperCase()),
            h('div', {style:{flex:1}},
              h('div', {style:{fontSize:13, fontWeight:600, color:'#374151'}}, p.name),
              h('div', {style:{fontSize:11, color:'#9ca3af'}}, 'paid $'+p.paid.toFixed(0)+' · owes $'+p.owed.toFixed(0))
            ),
            h('div', {style:{fontWeight:700, fontSize:14, color:p.balance>=0?'#16a34a':'#dc2626'}},
              p.balance>=0 ? '+$'+p.balance.toFixed(0) : '-$'+Math.abs(p.balance).toFixed(0)
            )
          );
        })
      ),
      h('div', {style:{fontSize:11, color:'#9ca3af', marginTop:10}}, '+ receives money · − owes money')
    ),
    // Add button
    h('button', {onClick:function(){setShowAdd(!showAdd);}, style:btn('#DC2626','#fff',{width:'100%', padding:'13px 0', fontSize:14, borderRadius:16})}, '+ Add Expense'),
    // Add form
    showAdd && h('div', {style:card({border:'1px solid #fecaca'})},
      h('div', {style:{fontWeight:700, color:'#1f2937', fontSize:15, marginBottom:12}}, 'New Expense'),
      h('div', {style:col(10)},
        h('input', {value:form.title, onChange:function(e){setForm(Object.assign({},form,{title:e.target.value}));}, placeholder:'What was it?', style:Object.assign({},INP,{width:'100%'})}),
        h('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8}},
          h('input', {type:'number', value:form.amount, onChange:function(e){setForm(Object.assign({},form,{amount:e.target.value}));}, placeholder:'$ Amount', style:Object.assign({},INP,{width:'100%'})}),
          h('input', {value:form.date, onChange:function(e){setForm(Object.assign({},form,{date:e.target.value}));}, placeholder:'Date (e.g. Apr 1)', style:Object.assign({},INP,{width:'100%'})})
        ),
        h('select', {value:form.category, onChange:function(e){setForm(Object.assign({},form,{category:e.target.value}));}, style:Object.assign({},INP,{width:'100%',background:'#fff'})},
          EXP_CATS.map(function(c){return h('option',{key:c,value:c},c);})
        ),
        h('div', null,
          h('div', {style:{fontSize:12, color:'#6b7280', marginBottom:8}}, 'Paid by'),
          h('div', {style:{display:'flex', flexWrap:'wrap', gap:8}},
            people.map(function(p) {
              return h('button', {key:p.id, onClick:function(){setForm(Object.assign({},form,{paidById:p.id}));}, style:pill(form.paidById===p.id, p.color)}, p.name);
            })
          )
        ),
        h('div', null,
          h('div', {style:{fontSize:12, color:'#6b7280', marginBottom:8}}, 'Split with'),
          h('div', {style:{display:'flex', flexWrap:'wrap', gap:8}},
            people.map(function(p) {
              var active = form.splitWithIds.indexOf(p.id) >= 0;
              return h('button', {key:p.id, onClick:function(){toggleSplit(p.id);}, style:pill(active, p.color)}, p.name + (active?' ✓':''));
            })
          )
        ),
        h('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8}},
          h('button', {onClick:save, style:btn('#DC2626','#fff',{width:'100%',padding:'11px 0'})}, 'Save'),
          h('button', {onClick:function(){setShowAdd(false);}, style:btn('#f3f4f6','#374151',{width:'100%',padding:'11px 0'})}, 'Cancel')
        )
      )
    ),
    // Expense list
    h('div', {style:col(10)},
      expenses.map(function(e) {
        var payer = people.find(function(p){return p.id===e.paidById;});
        var per = (e.amount/(e.splitWithIds.length||1)).toFixed(0);
        return h('div', {key:e.id, style:Object.assign(card({padding:14}), row())},
          h('div', {style:{fontSize:24, flexShrink:0}}, e.category.split(' ')[0]),
          h('div', {style:{flex:1, minWidth:0}},
            h('div', {style:{fontWeight:600, color:'#1f2937', fontSize:13, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}, e.title),
            h('div', {style:{fontSize:11, color:'#9ca3af', marginTop:2}}, e.date + ' · ' + (payer?payer.name:'?') + ' paid · $' + per + '/person')
          ),
          h('div', {style:{textAlign:'right', flexShrink:0}},
            h('div', {style:{fontWeight:700, color:'#1f2937', fontSize:14}}, '$'+e.amount),
            h('div', {style:{fontSize:11, color:'#9ca3af'}}, e.splitWithIds.length+' people')
          ),
          h('button', {onClick:function(){setExpenses(expenses.filter(function(x){return x.id!==e.id;}));}, style:{background:'none', border:'none', cursor:'pointer', color:'#d1d5db', fontSize:18}}, '🗑')
        );
      })
    )
  );
}

function ItineraryTab(props) {
  var itinerary = props.itinerary;
  var expandedState = useState(1);
  var expanded = expandedState[0]; var setExpanded = expandedState[1];

  return h('div', {style:col(10)},
    itinerary.map(function(day) {
      var isOpen = expanded === day.id;
      return h('div', {key:day.id, style:{background:'#fff', borderRadius:20, border:'1px solid #f3f4f6', overflow:'hidden'}},
        h('button', {onClick:function(){setExpanded(isOpen?null:day.id);}, style:{width:'100%', display:'flex', alignItems:'center', gap:12, padding:'14px 16px', background:'none', border:'none', cursor:'pointer', textAlign:'left'}},
          h('span', {style:{fontSize:22}}, day.emoji),
          h('div', {style:{flex:1}},
            h('div', {style:{fontWeight:700, color:'#1f2937', fontSize:14}}, day.day + ' — ' + day.city),
            h('div', {style:{fontSize:11, color:'#9ca3af', marginTop:1}}, day.date + ' · ' + day.activities.length + ' activities')
          ),
          h('span', {style:{color:'#9ca3af', fontSize:14}}, isOpen ? '▴' : '▾')
        ),
        isOpen && h('div', {style:{borderTop:'1px solid #f9fafb', padding:'4px 16px 16px'}},
          day.activities.map(function(act, i) {
            return h('div', {key:act.id, style:{display:'flex', gap:12, paddingTop:14}},
              h('div', {style:{display:'flex', flexDirection:'column', alignItems:'center'}},
                h('div', {style:{fontSize:18}}, ACT_EMOJI[act.type]||'📍'),
                i < day.activities.length-1 && h('div', {style:{width:1, flex:1, background:'#f3f4f6', margin:'4px 0'}})
              ),
              h('div', {style:{flex:1, paddingBottom:4}},
                h('div', {style:{display:'flex', alignItems:'baseline', gap:8, flexWrap:'wrap'}},
                  h('span', {style:{fontSize:11, fontFamily:'monospace', color:'#9ca3af', flexShrink:0}}, act.time),
                  h('span', {style:{fontSize:13, fontWeight:600, color:'#1f2937'}}, act.title)
                ),
                act.note && h('div', {style:{fontSize:11, color:'#6b7280', marginTop:3}}, act.note)
              )
            );
          })
        )
      );
    })
  );
}

// ── PLACES TAB ────────────────────────────────────────────────────────────────

function PlacesTab(props) {
  var places = props.places; var setPlaces = props.setPlaces;
  var cityState = useState('All'); var city = cityState[0]; var setCity = cityState[1];
  var doneState = useState(false); var showDone = doneState[0]; var setShowDone = doneState[1];

  var cities = ['All'].concat(places.map(function(p){return p.city;}).filter(function(c,i,a){return a.indexOf(c)===i;}));
  var filtered = places.filter(function(p){return (city==='All'||p.city===city)&&(showDone||!p.visited);});
  var done = places.filter(function(p){return p.visited;}).length;
  var starred = places.filter(function(p){return p.starred;}).length;

  function toggle(id, key) {
    setPlaces(places.map(function(p){return p.id===id ? Object.assign({},p,{[key]:!p[key]}) : p;}));
  }

  return h('div', {style:col(14)},
    h('div', {style:card()},
      h('div', {style:Object.assign(row(), {justifyContent:'space-between', marginBottom:10})},
        h('div', {style:{fontWeight:700, color:'#1f2937', fontSize:15}}, '📍 Places Tracker'),
        h('div', {style:{fontSize:13, color:'#6b7280'}}, done+'/'+places.length+' visited')
      ),
      h('div', {style:{background:'#f3f4f6', borderRadius:99, height:8, overflow:'hidden'}},
        h('div', {style:{background:'#DC2626', height:'100%', borderRadius:99, width:(done/places.length*100)+'%', transition:'width 0.4s'}})
      ),
      h('div', {style:{display:'flex', gap:16, marginTop:10, fontSize:12, color:'#6b7280'}},
        h('span', null, '⭐ '+starred+' must-see'),
        h('span', null, '✅ '+done+' done'),
        h('span', null, '🗺️ '+(places.length-done)+' remaining')
      )
    ),
    // City filters
    h('div', {style:{display:'flex', gap:8, overflowX:'auto', paddingBottom:4}},
      cities.map(function(c) {
        return h('button', {key:c, onClick:function(){setCity(c);}, style:pill(city===c,'#DC2626')}, c);
      }),
      h('button', {onClick:function(){setShowDone(!showDone);}, style:pill(showDone,'#16a34a')}, showDone?'✓ Showing all':'Show visited')
    ),
    // Places list
    h('div', {style:col(10)},
      filtered.length === 0 && h('div', {style:{textAlign:'center', padding:40, color:'#9ca3af', fontSize:13}}, 'No places to show. Try adjusting the filters.'),
      filtered.map(function(p) {
        return h('div', {key:p.id, style:{background:p.visited?'#f9fafb':'#fff', borderRadius:16, padding:14, border:'1px solid '+(p.visited?'#d1fae5':'#f3f4f6'), opacity:p.visited?0.7:1, transition:'all 0.2s'}},
          h('div', {style:{display:'flex', alignItems:'flex-start', gap:12}},
            h('span', {style:{fontSize:22, marginTop:2}}, p.emoji),
            h('div', {style:{flex:1, minWidth:0}},
              h('div', {style:{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}},
                h('span', {style:{fontWeight:600, fontSize:14, color:p.visited?'#9ca3af':'#1f2937', textDecoration:p.visited?'line-through':'none'}}, p.name),
                h('span', {style:{fontSize:10, background:'#f3f4f6', color:'#6b7280', padding:'2px 8px', borderRadius:99}}, p.city),
                h('span', {style:{fontSize:10, background:'#fef9c3', color:'#92400e', padding:'2px 8px', borderRadius:99}}, p.category)
              ),
              h('div', {style:{fontSize:12, color:'#6b7280', marginTop:4}}, p.description)
            ),
            h('div', {style:{display:'flex', gap:8, flexShrink:0, alignItems:'center'}},
              h('button', {onClick:function(){toggle(p.id,'starred');}, style:{background:'none', border:'none', cursor:'pointer', fontSize:18, lineHeight:1, color:p.starred?'#f59e0b':'#d1d5db'}}, p.starred?'⭐':'☆'),
              h('button', {onClick:function(){toggle(p.id,'visited');}, style:{width:28, height:28, borderRadius:'50%', border:'2px solid', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, borderColor:p.visited?'#16a34a':'#d1d5db', background:p.visited?'#16a34a':'transparent', color:'#fff', fontSize:12}},
                p.visited ? '✓' : ''
              )
            )
          )
        );
      })
    )
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────

var TABS = [
  {id:'people',    label:'People',    icon:'👥'},
  {id:'itinerary', label:'Itinerary', icon:'📅'},
  {id:'expenses',  label:'Expenses',  icon:'💰'},
  {id:'places',    label:'Places',    icon:'📍'}
];

function App() {
  var tabState = useState('itinerary'); var tab = tabState[0]; var setTab = tabState[1];
  var peopleState = useState(INIT_PEOPLE); var people = peopleState[0]; var setPeople = peopleState[1];
  var expState = useState(INIT_EXPENSES); var expenses = expState[0]; var setExpenses = expState[1];
  var itinerary = INIT_ITINERARY;
  var placesState = useState(INIT_PLACES); var places = placesState[0]; var setPlaces = placesState[1];

  return h('div', {style:{minHeight:'100vh', background:'#f9fafb'}},
    // Header
    h('div', {style:{background:'linear-gradient(135deg,#DC2626,#B91C1C)', color:'#fff', padding:'32px 20px 60px'}},
      h('div', {style:{maxWidth:520, margin:'0 auto'}},
        h('div', {style:{fontSize:13, color:'#fca5a5', marginBottom:6, letterSpacing:1}}, '🇯🇵 SPRING TRIP 2026'),
        h('div', {style:{fontSize:32, fontWeight:800, letterSpacing:-0.5}}, 'Japan ✦'),
        h('div', {style:{fontSize:13, color:'#fca5a5', marginTop:6}}, 'Apr 1–10 · Tokyo · Hakone · Kyoto · Osaka')
      )
    ),
    // Tab bar
    h('div', {style:{maxWidth:520, margin:'-36px auto 0', padding:'0 16px'}},
      h('div', {style:{background:'#fff', borderRadius:20, padding:6, display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:4, boxShadow:'0 4px 24px rgba(0,0,0,0.10)'}},
        TABS.map(function(t) {
          var active = tab === t.id;
          return h('button', {key:t.id, onClick:function(){setTab(t.id);}, style:{padding:'10px 4px', borderRadius:14, border:'none', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:3, transition:'all 0.15s', background:active?'#DC2626':'transparent', color:active?'#fff':'#6b7280'}},
            h('span', {style:{fontSize:16}}, t.icon),
            h('span', {style:{fontSize:11, fontWeight:600}}, t.label)
          );
        })
      )
    ),
    // Content
    h('div', {style:{maxWidth:520, margin:'0 auto', padding:'20px 16px 48px'}},
      tab==='people'    && h(PeopleTab,    {people:people, setPeople:setPeople}),
      tab==='itinerary' && h(ItineraryTab, {itinerary:itinerary}),
      tab==='expenses'  && h(ExpensesTab,  {expenses:expenses, setExpenses:setExpenses, people:people}),
      tab==='places'    && h(PlacesTab,    {places:places, setPlaces:setPlaces})
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));
</script>
</body>
</html>
