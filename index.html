const EXP_CATS=['✈️ Transport','🏨 Accommodation','🍜 Food','🎭 Activities','🛍️ Shopping','💊 Medical','📱 Misc'];
const COLORS=['#DC2626','#7C3AED','#2563EB','#059669','#D97706','#DB2777'];
const ACT_EMOJI={transport:'🚅',accommodation:'🏨',food:'🍜',culture:'⛩️',explore:'🗺️',activity:'🎭',sightseeing:'📸',relaxation:'♨️'};

// ── HELPERS ───────────────────────────────────────────────────────────────────

const s=(...styles)=>Object.assign({},...styles.filter(Boolean));
const card=(extra={})=>s({background:'#fff',borderRadius:20,padding:18,border:'1px solid #f3f4f6'},extra);
const btn=(bg,color,extra={})=>s({padding:'9px 18px',background:bg,color,border:'none',borderRadius:12,cursor:'pointer',fontWeight:600,fontSize:13},extra);
const inp={padding:'9px 12px',borderRadius:12,border:'1px solid #e5e7eb',fontSize:13,width:'100%'};
const pill=(active,ac,ic)=>({padding:'7px 14px',borderRadius:99,fontSize:12,fontWeight:500,border:'1px solid',flexShrink:0,cursor:'pointer',borderColor:active?ac:'#e5e7eb',background:active?ac:'#fff',color:active?'#fff':ic||'#374151'});
const avatar=(color)=>({width:36,height:36,borderRadius:'50%',background:color,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,flexShrink:0});
const row=(extra={})=>s({display:'flex',alignItems:'center',gap:10},extra);
const col=(gap=12)=>({display:'flex',flexDirection:'column',gap});

// ── PEOPLE ────────────────────────────────────────────────────────────────────

function PeopleTab({people,setPeople}){
  const[name,setName]=useState('');
  const add=()=>{
    if(!name.trim())return;
    setPeople([...people,{id:Date.now(),name:name.trim(),color:COLORS[people.length%COLORS.length]}]);
    setName('');
  };
  return html`<div style=${col()}>
    <div style=${{background:'linear-gradient(135deg,#fef2f2,#fdf4ff)',borderRadius:20,padding:20,border:'1px solid #fecaca'}}>
      <div style=${{fontWeight:700,color:'#1f2937',marginBottom:12,fontSize:15}}>🗾 Trip Overview</div>
      <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        ${[['Destination','Japan 🇯🇵'],['Travelers',people.length+' people'],['Dates','Apr 1–10, 2026'],['Duration','10 days'],['Cities','Tokyo · Hakone · Kyoto · Osaka']].map(([k,v])=>html`
          <div key=${k}><div style=${{fontSize:11,color:'#9ca3af'}}>${k}</div><div style=${{fontSize:14,fontWeight:600,color:'#1f2937',marginTop:2}}>${v}</div></div>`)}
      </div>
    </div>
    <div style=${card()}>
      <div style=${{fontWeight:700,color:'#1f2937',marginBottom:14,fontSize:15}}>👥 Travelers (${people.length})</div>
      <div style=${col(10)}>
        ${people.map(p=>html`
          <div key=${p.id} style=${{...row(),background:'#f9fafb',borderRadius:14,padding:'10px 14px'}}>
            <div style=${avatar(p.color)}>${p.name.slice(0,2).toUpperCase()}</div>
            <span style=${{flex:1,fontWeight:500,color:'#374151'}}>${p.name}</span>
            <button onclick=${()=>setPeople(people.filter(x=>x.id!==p.id))} style=${{background:'none',border:'none',cursor:'pointer',color:'#d1d5db',fontSize:16}}>✕</button>
          </div>`)}
      </div>
      <div style=${{...row(),marginTop:14}}>
        <input value=${name} oninput=${e=>setName(e.target.value)} onkeydown=${e=>e.key==='Enter'&&add()} placeholder="Add traveler name..." style=${{...inp,flex:1}}/>
        <button onclick=${add} style=${btn('#DC2626','#fff')}>+ Add</button>
      </div>
    </div>
  </div>`;
}

// ── EXPENSES ──────────────────────────────────────────────────────────────────

function ExpensesTab({expenses,setExpenses,people}){
  const[showAdd,setShowAdd]=useState(false);
  const[form,setForm]=useState({title:'',amount:'',paidById:people[0]?.id||1,splitWithIds:people.map(p=>p.id),category:EXP_CATS[0],date:''});
  const total=expenses.reduce((s,e)=>s+e.amount,0);
  const balances=useMemo(()=>{
    const paid={},owed={};
    people.forEach(p=>{paid[p.id]=0;owed[p.id]=0;});
    expenses.forEach(e=>{
      paid[e.paidById]=(paid[e.paidById]||0)+e.amount;
      const share=e.amount/(e.splitWithIds.length||1);
      e.splitWithIds.forEach(id=>{owed[id]=(owed[id]||0)+share;});
    });
    return people.map(p=>({...p,paid:paid[p.id]||0,owed:owed[p.id]||0,balance:(paid[p.id]||0)-(owed[p.id]||0)}));
  },[expenses,people]);
  const toggleSplit=id=>setForm(f=>({...f,splitWithIds:f.splitWithIds.includes(id)?f.splitWithIds.filter(x=>x!==id):[...f.splitWithIds,id]}));
  const save=()=>{
    if(!form.title||!form.amount||!form.splitWithIds.length)return;
    setExpenses([...expenses,{id:Date.now(),...form,amount:parseFloat(form.amount)}]);
    setForm({title:'',amount:'',paidById:people[0]?.id||1,splitWithIds:people.map(p=>p.id),category:EXP_CATS[0],date:''});
    setShowAdd(false);
  };
  return html`<div style=${col(14)}>
    <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
      ${[['Total Spent','$'+total.toLocaleString()],['Per Person','$'+(people.length?Math.round(total/people.length).toLocaleString():'0')],['Entries',''+expenses.length]].map(([l,v])=>html`
        <div key=${l} style=${s(card({padding:14}),{textAlign:'center'})}>
          <div style=${{fontSize:11,color:'#9ca3af',marginBottom:4}}>${l}</div>
          <div style=${{fontSize:20,fontWeight:700,color:'#1f2937'}}>${v}</div>
        </div>`)}
    </div>
    <div style=${card()}>
      <div style=${{fontWeight:700,color:'#1f2937',marginBottom:12,fontSize:15}}>💰 Who Owes What</div>
      <div style=${col(10)}>
        ${balances.map(p=>html`
          <div key=${p.id} style=${row()}>
            <div style=${avatar(p.color)}>${p.name.slice(0,2).toUpperCase()}</div>
            <div style=${{flex:1}}>
              <div style=${{fontSize:13,fontWeight:600,color:'#374151'}}>${p.name}</div>
              <div style=${{fontSize:11,color:'#9ca3af'}}>paid $${p.paid.toFixed(0)} · owes $${p.owed.toFixed(0)}</div>
            </div>
            <div style=${{fontWeight:700,fontSize:14,color:p.balance>=0?'#16a34a':'#dc2626'}}>
              ${p.balance>=0?'+$'+p.balance.toFixed(0):'-$'+Math.abs(p.balance).toFixed(0)}
            </div>
          </div>`)}
      </div>
      <div style=${{fontSize:11,color:'#9ca3af',marginTop:10}}>+ receives money · − owes money</div>
    </div>
    <button onclick=${()=>setShowAdd(!showAdd)} style=${{...btn('#DC2626','#fff'),width:'100%',padding:'13px 0',fontSize:14,borderRadius:16}}>+ Add Expense</button>
    ${showAdd&&html`
      <div style=${card({border:'1px solid #fecaca'})}>
        <div style=${{fontWeight:700,color:'#1f2937',fontSize:15,marginBottom:12}}>New Expense</div>
        <div style=${col(10)}>
          <input value=${form.title} oninput=${e=>setForm({...form,title:e.target.value})} placeholder="What was it?" style=${inp}/>
          <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <input type="number" value=${form.amount} oninput=${e=>setForm({...form,amount:e.target.value})} placeholder="$ Amount" style=${inp}/>
            <input value=${form.date} oninput=${e=>setForm({...form,date:e.target.value})} placeholder="Date (e.g. Apr 1)" style=${inp}/>
          </div>
          <select value=${form.category} onchange=${e=>setForm({...form,category:e.target.value})} style=${{...inp,background:'#fff'}}>
            ${EXP_CATS.map(c=>html`<option key=${c} value=${c}>${c}</option>`)}
          </select>
          <div>
            <div style=${{fontSize:12,color:'#6b7280',marginBottom:8}}>Paid by</div>
            <div style=${{display:'flex',flexWrap:'wrap',gap:8}}>
              ${people.map(p=>html`<button key=${p.id} onclick=${()=>setForm({...form,paidById:p.id})} style=${pill(form.paidById===p.id,p.color)}>${p.name}</button>`)}
            </div>
          </div>
          <div>
            <div style=${{fontSize:12,color:'#6b7280',marginBottom:8}}>Split with</div>
            <div style=${{display:'flex',flexWrap:'wrap',gap:8}}>
              ${people.map(p=>html`<button key=${p.id} onclick=${()=>toggleSplit(p.id)} style=${pill(form.splitWithIds.includes(p.id),p.color)}>${p.name} ${form.splitWithIds.includes(p.id)?'✓':''}</button>`)}
            </div>
          </div>
          <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <button onclick=${save} style=${btn('#DC2626','#fff',{width:'100%',padding:'11px 0'})}>Save</button>
            <button onclick=${()=>setShowAdd(false)} style=${btn('#f3f4f6','#374151',{width:'100%',padding:'11px 0'})}>Cancel</button>
          </div>
        </div>
      </div>`}
    <div style=${col(10)}>
      ${expenses.map(e=>{
        const payer=people.find(p=>p.id===e.paidById);
        const per=(e.amount/(e.splitWithIds.length||1)).toFixed(0);
        return html`
          <div key=${e.id} style=${s(card({padding:14}),row())}>
            <div style=${{fontSize:24,flexShrink:0}}>${e.category.split(' ')[0]}</div>
            <div style=${{flex:1,minWidth:0}}>
              <div style=${{fontWeight:600,color:'#1f2937',fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${e.title}</div>
              <div style=${{fontSize:11,color:'#9ca3af',marginTop:2}}>${e.date} · ${payer?.name} paid · $${per}/person</div>
            </div>
            <div style=${{textAlign:'right',flexShrink:0}}>
              <div style=${{fontWeight:700,color:'#1f2937',fontSize:14}}>$${e.amount}</div>
              <div style=${{fontSize:11,color:'#9ca3af'}}>${e.splitWithIds.length} people</div>
            </div>
            <button onclick=${()=>setExpenses(expenses.filter(x=>x.id!==e.id))} style=${{background:'none',border:'none',cursor:'pointer',color:'#d1d5db',fontSize:16}}>🗑</button>
          </div>`;
      })}
    </div>
  </div>`;
}

function ItineraryTab({itinerary}){
  const[expanded,setExpanded]=useState(1);
  return html`<div style=${col(10)}>
    ${itinerary.map(day=>html`
      <div key=${day.id} style=${{background:'#fff',borderRadius:20,border:'1px solid #f3f4f6',overflow:'hidden'}}>
        <button onclick=${()=>setExpanded(expanded===day.id?null:day.id)}
          style=${{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'14px 16px',background:'none',border:'none',cursor:'pointer',textAlign:'left'}}>
          <span style=${{fontSize:22}}>${day.emoji}</span>
          <div style=${{flex:1}}>
            <div style=${{fontWeight:700,color:'#1f2937',fontSize:14}}>${day.day} — ${day.city}</div>
            <div style=${{fontSize:11,color:'#9ca3af',marginTop:1}}>${day.date} · ${day.activities.length} activities</div>
          </div>
          <span style=${{color:'#9ca3af',fontSize:14}}>${expanded===day.id?'▴':'▾'}</span>
        </button>
        ${expanded===day.id&&html`
          <div style=${{borderTop:'1px solid #f9fafb',padding:'4px 16px 16px'}}>
            ${day.activities.map((act,i)=>html`
              <div key=${act.id} style=${{display:'flex',gap:12,paddingTop:14}}>
                <div style=${{display:'flex',flexDirection:'column',alignItems:'center'}}>
                  <div style=${{fontSize:18}}>${ACT_EMOJI[act.type]||'📍'}</div>
                  ${i<day.activities.length-1&&html`<div style=${{width:1,flex:1,background:'#f3f4f6',margin:'4px 0'}}/>`}
                </div>
                <div style=${{flex:1,paddingBottom:4}}>
                  <div style=${{display:'flex',alignItems:'baseline',gap:8,flexWrap:'wrap'}}>
                    <span style=${{fontSize:11,fontFamily:'monospace',color:'#9ca3af',flexShrink:0}}>${act.time}</span>
                    <span style=${{fontSize:13,fontWeight:600,color:'#1f2937'}}>${act.title}</span>
                  </div>
                  ${act.note&&html`<div style=${{fontSize:11,color:'#6b7280',marginTop:3}}>${act.note}</div>`}
                </div>
              </div>`)}
          </div>`}
      </div>`)}
  </div>`;
}

// ── PLACES ────────────────────────────────────────────────────────────────────

function PlacesTab({places,setPlaces}){
  const[city,setCity]=useState('All');
  const[showDone,setShowDone]=useState(false);
  const cities=['All',...new Set(places.map(p=>p.city))];
  const filtered=places.filter(p=>(city==='All'||p.city===city)&&(showDone||!p.visited));
  const done=places.filter(p=>p.visited).length;
  const starred=places.filter(p=>p.starred).length;
  const toggle=(id,key)=>setPlaces(places.map(p=>p.id===id?{...p,[key]:!p[key]}:p));
  return html`<div style=${col(14)}>
    <div style=${card()}>
      <div style=${{...row(),justifyContent:'space-between',marginBottom:10}}>
        <div style=${{fontWeight:700,color:'#1f2937',fontSize:15}}>📍 Places Tracker</div>
        <div style=${{fontSize:13,color:'#6b7280'}}>${done}/${places.length} visited</div>
      </div>
      <div style=${{background:'#f3f4f6',borderRadius:99,height:8,overflow:'hidden'}}>
        <div style=${{background:'#DC2626',height:'100%',borderRadius:99,width:(done/places.length*100)+'%',transition:'width 0.4s'}}/>
      </div>
      <div style=${{display:'flex',gap:16,marginTop:10,fontSize:12,color:'#6b7280'}}>
        <span>⭐ ${starred} must-see</span>
        <span>✅ ${done} done</span>
        <span>🗺️ ${places.length-done} remaining</span>
      </div>
    </div>
    <div style=${{display:'flex',gap:8,overflowX:'auto',paddingBottom:4}}>
      ${cities.map(c=>html`<button key=${c} onclick=${()=>setCity(c)} style=${pill(city===c,'#DC2626')}>${c}</button>`)}
      <button onclick=${()=>setShowDone(!showDone)} style=${pill(showDone,'#16a34a')}>${showDone?'✓ Showing all':'Show visited'}</button>
    </div>
    <div style=${col(10)}>
      ${filtered.length===0&&html`<div style=${{textAlign:'center',padding:40,color:'#9ca3af',fontSize:13}}>No places to show. Try adjusting filters.</div>`}
      ${filtered.map(p=>html`
        <div key=${p.id} style=${{background:p.visited?'#f9fafb':'#fff',borderRadius:16,padding:14,border:'1px solid '+(p.visited?'#d1fae5':'#f3f4f6'),opacity:p.visited?0.7:1,transition:'all 0.2s'}}>
          <div style=${{display:'flex',alignItems:'flex-start',gap:12}}>
            <span style=${{fontSize:22,marginTop:2}}>${p.emoji}</span>
            <div style=${{flex:1,minWidth:0}}>
              <div style=${{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span style=${{fontWeight:600,fontSize:14,color:p.visited?'#9ca3af':'#1f2937',textDecoration:p.visited?'line-through':'none'}}>${p.name}</span>
                <span style=${{fontSize:10,background:'#f3f4f6',color:'#6b7280',padding:'2px 8px',borderRadius:99}}>${p.city}</span>
                <span style=${{fontSize:10,background:'#fef9c3',color:'#92400e',padding:'2px 8px',borderRadius:99}}>${p.category}</span>
              </div>
              <div style=${{fontSize:12,color:'#6b7280',marginTop:4}}>${p.description}</div>
            </div>
            <div style=${{display:'flex',gap:8,flexShrink:0,alignItems:'center'}}>
              <button onclick=${()=>toggle(p.id,'starred')} style=${{background:'none',border:'none',cursor:'pointer',fontSize:18,lineHeight:1,color:p.starred?'#f59e0b':'#d1d5db'}}>
                ${p.starred?'⭐':'☆'}
              </button>
              <button onclick=${()=>toggle(p.id,'visited')}
                style=${{width:28,height:28,borderRadius:'50%',border:'2px solid',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,borderColor:p.visited?'#16a34a':'#d1d5db',background:p.visited?'#16a34a':'transparent',color:'#fff',fontSize:12}}>
                ${p.visited?'✓':''}
              </button>
            </div>
          </div>
        </div>`)}
    </div>
  </div>`;
}

// ── APP ───────────────────────────────────────────────────────────────────────

const TABS=[{id:'people',label:'People',icon:'👥'},{id:'itinerary',label:'Itinerary',icon:'📅'},{id:'expenses',label:'Expenses',icon:'💰'},{id:'places',label:'Places',icon:'📍'}];

function App(){
  const[tab,setTab]=useState('itinerary');
  const[people,setPeople]=useState(INIT_PEOPLE);
  const[expenses,setExpenses]=useState(INIT_EXPENSES);
  const[itinerary]=useState(INIT_ITINERARY);
  const[places,setPlaces]=useState(INIT_PLACES);
  return html`<div style=${{minHeight:'100vh',background:'#f9fafb'}}>
    <div style=${{background:'linear-gradient(135deg,#DC2626,#B91C1C)',color:'#fff',padding:'32px 20px 60px'}}>
      <div style=${{maxWidth:520,margin:'0 auto'}}>
        <div style=${{fontSize:13,color:'#fca5a5',marginBottom:6,letterSpacing:1}}>🇯🇵 SPRING TRIP 2026</div>
        <div style=${{fontSize:32,fontWeight:800,letterSpacing:-0.5}}>Japan ✦</div>
        <div style=${{fontSize:13,color:'#fca5a5',marginTop:6}}>Apr 1–10 · Tokyo · Hakone · Kyoto · Osaka</div>
      </div>
    </div>
    <div style=${{maxWidth:520,margin:'-36px auto 0',padding:'0 16px'}}>
      <div style=${{background:'#fff',borderRadius:20,padding:6,display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:4,boxShadow:'0 4px 24px rgba(0,0,0,0.10)'}}>
        ${TABS.map(t=>html`
          <button key=${t.id} onclick=${()=>setTab(t.id)}
            style=${{padding:'10px 4px',borderRadius:14,border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3,transition:'all 0.15s',background:tab===t.id?'#DC2626':'transparent',color:tab===t.id?'#fff':'#6b7280'}}>
            <span style=${{fontSize:16}}>${t.icon}</span>
            <span style=${{fontSize:11,fontWeight:600}}>${t.label}</span>
          </button>`)}
      </div>
    </div>
    <div style=${{maxWidth:520,margin:'0 auto',padding:'20px 16px 48px'}}>
      ${tab==='people'    && html`<${PeopleTab}    people=${people}     setPeople=${setPeople}/>`}
      ${tab==='itinerary' && html`<${ItineraryTab} itinerary=${itinerary}/>`}
      ${tab==='expenses'  && html`<${ExpensesTab}  expenses=${expenses} setExpenses=${setExpenses} people=${people}/>`}
      ${tab==='places'    && html`<${PlacesTab}    places=${places}     setPlaces=${setPlaces}/>`}
    </div>
  </div>`;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
