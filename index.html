    const INITIAL_PLACES = [
      { id:1,  name:"Senso-ji Temple",         city:"Tokyo",  category:"Culture",    emoji:"⛩️", description:"Tokyo's oldest and most iconic temple in Asakusa",            visited:false, starred:true  },
      { id:2,  name:"Shibuya Crossing",        city:"Tokyo",  category:"Iconic",     emoji:"🚦", description:"The world's busiest pedestrian crossing",                     visited:false, starred:true  },

      { id:4,  name:"Meiji Shrine",            city:"Tokyo",  category:"Culture",    emoji:"🌲", description:"Serene Shinto shrine surrounded by forested park",             visited:false, starred:false },
      { id:5,  name:"Tsukiji Market",          city:"Tokyo",  category:"Food",       emoji:"🐟", description:"World-famous seafood and street food market",                  visited:false, starred:false },
      { id:6,  name:"Akihabara",               city:"Tokyo",  category:"Shopping",   emoji:"🎮", description:"Electric Town for electronics, anime, and arcades",            visited:false, starred:false },
      { id:7,  name:"Harajuku",                city:"Tokyo",  category:"Shopping",   emoji:"👗", description:"Wild fashion district and Takeshita Street",                  visited:false, starred:false },
      { id:8,  name:"Golden Gai, Shinjuku",    city:"Tokyo",  category:"Nightlife",  emoji:"🍶", description:"Hundreds of tiny atmospheric retro bars",                     visited:false, starred:false },
      { id:9,  name:"Mt. Fuji View (Ashi)",    city:"Hakone", category:"Nature",     emoji:"🗻", description:"Iconic view of Mt. Fuji reflected in Lake Ashi",              visited:false, starred:true  },
      { id:10, name:"Hakone Open Air Museum",  city:"Hakone", category:"Art",        emoji:"🖼️", description:"Outdoor sculpture park with spectacular Fuji views",          visited:false, starred:false },
      { id:11, name:"Onsen (Hot Springs)",     city:"Hakone", category:"Relaxation", emoji:"♨️", description:"Traditional Japanese hot spring bathing at a Ryokan",        visited:false, starred:true  },
      { id:12, name:"Fushimi Inari Shrine",    city:"Kyoto",  category:"Culture",    emoji:"⛩️", description:"Thousands of bright red torii gates climbing the mountain",   visited:false, starred:true  },

      { id:16, name:"Philosopher's Path",      city:"Kyoto",  category:"Nature",     emoji:"🌸", description:"Stone canal path lined with cherry blossom trees",            visited:false, starred:false },
      { id:17, name:"Nijo Castle",             city:"Kyoto",  category:"Culture",    emoji:"🏯", description:"UNESCO castle famous for its 'nightingale floors'",           visited:false, starred:false },
      { id:18, name:"Dotonbori",               city:"Osaka",  category:"Food",       emoji:"🦞", description:"Neon-lit canal district — Osaka's street food paradise",      visited:false, starred:true  },
      { id:19, name:"Osaka Castle",            city:"Osaka",  category:"Culture",    emoji:"🏯", description:"Iconic 16th-century castle with beautiful park grounds",      visited:false, starred:false },
      { id:20, name:"Universal Studios Japan", city:"Osaka",  category:"Activity",   emoji:"🎢", description:"Theme park with Nintendo World and Harry Potter world",       visited:false, starred:false },
      { id:21, name:"Kuromon Ichiba Market",   city:"Osaka",  category:"Food",       emoji:"🥘", description:"Lively local market — 'Osaka's kitchen'",                    visited:false, starred:false },
      { id:22, name:"Namba District",          city:"Osaka",  category:"Nightlife",  emoji:"🌃", description:"Heart of Osaka's nightlife, shopping and entertainment",     visited:false, starred:false },
    ];

    const EXPENSE_CATEGORIES = ["✈️ Transport","🏨 Accommodation","🍜 Food","🎭 Activities","🛍️ Shopping","💊 Medical","📱 Misc"];
    const AVATAR_COLORS = ["#DC2626","#7C3AED","#2563EB","#059669","#D97706","#DB2777"];
    const ACT_EMOJI = { transport:"🚅", accommodation:"🏨", food:"🍜", culture:"⛩️", explore:"🗺️", activity:"🎭", sightseeing:"📸", relaxation:"♨️" };

    // ── PEOPLE TAB ──────────────────────────────────────────────────────────────

    function PeopleTab({ people, setPeople }) {
      const [newName, setNewName] = useState("");
      const add = () => {
        if (!newName.trim()) return;
        setPeople([...people, { id: Date.now(), name: newName.trim(), color: AVATAR_COLORS[people.length % AVATAR_COLORS.length] }]);
        setNewName("");
      };
      return (
        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          <div style={{ background:"linear-gradient(135deg,#fef2f2,#fdf4ff)", borderRadius:20, padding:20, border:"1px solid #fecaca" }}>
            <div style={{ fontWeight:700, color:"#1f2937", marginBottom:12, fontSize:15 }}>🗾 Trip Overview</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              {[["Destination","Japan 🇯🇵"],["Travelers",people.length+" people"],["Dates","Apr 1–10, 2026"],["Duration","10 days"],["Cities","Tokyo · Hakone · Kyoto · Osaka"]].map(([k,v])=>(
                <div key={k}><div style={{ fontSize:11, color:"#9ca3af" }}>{k}</div><div style={{ fontSize:14, fontWeight:600, color:"#1f2937", marginTop:2 }}>{v}</div></div>
              ))}
            </div>
          </div>
          <div style={{ background:"#fff", borderRadius:20, padding:20, border:"1px solid #f3f4f6" }}>
            <div style={{ fontWeight:700, color:"#1f2937", marginBottom:14, fontSize:15 }}>👥 Travelers ({people.length})</div>
            <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:16 }}>
              {people.map(p => (
                <div key={p.id} style={{ display:"flex", alignItems:"center", gap:12, background:"#f9fafb", borderRadius:14, padding:"10px 14px" }}>
                  <div style={{ width:38, height:38, borderRadius:"50%", background:p.color, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, fontSize:13, flexShrink:0 }}>
                    {p.name.slice(0,2).toUpperCase()}
                  </div>
                  <span style={{ flex:1, fontWeight:500, color:"#374151" }}>{p.name}</span>
                  <button onClick={()=>setPeople(people.filter(x=>x.id!==p.id))} style={{ background:"none", border:"none", cursor:"pointer", color:"#d1d5db", fontSize:16, padding:4, lineHeight:1 }}>✕</button>
                </div>
              ))}
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Add traveler name..."
                style={{ flex:1, padding:"9px 14px", borderRadius:12, border:"1px solid #e5e7eb", fontSize:13 }} />
              <button onClick={add} style={{ padding:"9px 18px", background:"#DC2626", color:"#fff", borderRadius:12, border:"none", cursor:"pointer", fontSize:13, fontWeight:600 }}>
                + Add
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ── EXPENSES TAB ────────────────────────────────────────────────────────────

    function ExpensesTab({ expenses, setExpenses, people }) {
      const [showAdd, setShowAdd] = useState(false);
      const [form, setForm] = useState({ title:"", amount:"", paidById:people[0]?.id||1, splitWithIds:people.map(p=>p.id), category:EXPENSE_CATEGORIES[0], date:"" });

      const totalSpent = expenses.reduce((s,e)=>s+e.amount, 0);

      const balances = useMemo(()=>{
        const paid={}, owed={};
        people.forEach(p=>{paid[p.id]=0; owed[p.id]=0;});
        expenses.forEach(e=>{
          paid[e.paidById]=(paid[e.paidById]||0)+e.amount;
          const share = e.amount/(e.splitWithIds.length||1);
          e.splitWithIds.forEach(id=>{ owed[id]=(owed[id]||0)+share; });
        });
        return people.map(p=>({ ...p, paid:paid[p.id]||0, owed:owed[p.id]||0, balance:(paid[p.id]||0)-(owed[p.id]||0) }));
      }, [expenses, people]);

      const addExpense = () => {
        if (!form.title||!form.amount||!form.splitWithIds.length) return;
        setExpenses([...expenses, { id:Date.now(), ...form, amount:parseFloat(form.amount) }]);
        setForm({ title:"", amount:"", paidById:people[0]?.id||1, splitWithIds:people.map(p=>p.id), category:EXPENSE_CATEGORIES[0], date:"" });
        setShowAdd(false);
      };
      const toggleSplit = id => setForm(f=>({ ...f, splitWithIds: f.splitWithIds.includes(id)?f.splitWithIds.filter(x=>x!==id):[...f.splitWithIds,id] }));
      const inp = { padding:"9px 12px", borderRadius:12, border:"1px solid #e5e7eb", fontSize:13, width:"100%" };

      return (
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 }}>
            {[["Total Spent","$"+totalSpent.toLocaleString()],["Per Person","$"+(people.length?Math.round(totalSpent/people.length).toLocaleString():"0")],["Entries",""+expenses.length]].map(([l,v])=>(
              <div key={l} style={{ background:"#fff", borderRadius:16, padding:14, border:"1px solid #f3f4f6", textAlign:"center" }}>
                <div style={{ fontSize:11, color:"#9ca3af", marginBottom:4 }}>{l}</div>
                <div style={{ fontSize:20, fontWeight:700, color:"#1f2937" }}>{v}</div>
              </div>
            ))}
          </div>

          <div style={{ background:"#fff", borderRadius:20, padding:18, border:"1px solid #f3f4f6" }}>
            <div style={{ fontWeight:700, color:"#1f2937", marginBottom:12, fontSize:15 }}>💰 Who Owes What</div>
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {balances.map(p=>(
                <div key={p.id} style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ width:34, height:34, borderRadius:"50%", background:p.color, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, fontSize:12, flexShrink:0 }}>
                    {p.name.slice(0,2).toUpperCase()}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:600, color:"#374151" }}>{p.name}</div>
                    <div style={{ fontSize:11, color:"#9ca3af" }}>paid ${p.paid.toFixed(0)} · owes ${p.owed.toFixed(0)}</div>
                  </div>
                  <div style={{ fontWeight:700, fontSize:14, color:p.balance>=0?"#16a34a":"#dc2626" }}>
                    {p.balance>=0?"+$"+p.balance.toFixed(0):"-$"+Math.abs(p.balance).toFixed(0)}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ fontSize:11, color:"#9ca3af", marginTop:10 }}>+ receives money · − owes money</div>
          </div>

          <button onClick={()=>setShowAdd(!showAdd)} style={{ width:"100%", padding:"13px 0", background:"#DC2626", color:"#fff", borderRadius:16, border:"none", cursor:"pointer", fontWeight:600, fontSize:14 }}>
            + Add Expense
          </button>

          {showAdd && (
            <div style={{ background:"#fff", borderRadius:20, padding:20, border:"1px solid #fecaca", display:"flex", flexDirection:"column", gap:12 }}>
              <div style={{ fontWeight:700, color:"#1f2937", fontSize:15 }}>New Expense</div>
              <input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="What was it?" style={inp} />
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                <input type="number" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} placeholder="$ Amount" style={inp} />
                <input value={form.date} onChange={e=>setForm({...form,date:e.target.value})} placeholder="Date (e.g. Apr 1)" style={inp} />
              </div>
              <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} style={{...inp, background:"#fff"}}>
                {EXPENSE_CATEGORIES.map(c=><option key={c}>{c}</option>)}
              </select>
              <div>
                <div style={{ fontSize:12, color:"#6b7280", marginBottom:8 }}>Paid by</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                  {people.map(p=>(
                    <button key={p.id} onClick={()=>setForm({...form,paidById:p.id})}
                      style={{ padding:"6px 14px", borderRadius:99, fontSize:12, fontWeight:500, border:"none", cursor:"pointer", background:form.paidById===p.id?p.color:"#f3f4f6", color:form.paidById===p.id?"#fff":"#374151" }}>
                      {p.name}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <div style={{ fontSize:12, color:"#6b7280", marginBottom:8 }}>Split with</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                  {people.map(p=>(
                    <button key={p.id} onClick={()=>toggleSplit(p.id)}
                      style={{ padding:"6px 14px", borderRadius:99, fontSize:12, fontWeight:500, border:"none", cursor:"pointer", background:form.splitWithIds.includes(p.id)?p.color:"#f3f4f6", color:form.splitWithIds.includes(p.id)?"#fff":"#374151" }}>
                      {p.name} {form.splitWithIds.includes(p.id)?"✓":""}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                <button onClick={addExpense} style={{ padding:"11px 0", background:"#DC2626", color:"#fff", borderRadius:12, border:"none", cursor:"pointer", fontWeight:600, fontSize:13 }}>Save</button>
                <button onClick={()=>setShowAdd(false)} style={{ padding:"11px 0", background:"#f3f4f6", color:"#374151", borderRadius:12, border:"none", cursor:"pointer", fontWeight:600, fontSize:13 }}>Cancel</button>
              </div>
            </div>
          )}

          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {expenses.map(e=>{
              const payer = people.find(p=>p.id===e.paidById);
              const per = (e.amount/(e.splitWithIds.length||1)).toFixed(0);
              return (
                <div key={e.id} style={{ background:"#fff", borderRadius:16, padding:14, border:"1px solid #f3f4f6", display:"flex", alignItems:"center", gap:12 }}>
                  <div style={{ fontSize:24, flexShrink:0 }}>{e.category.split(" ")[0]}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontWeight:600, color:"#1f2937", fontSize:13, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{e.title}</div>
                    <div style={{ fontSize:11, color:"#9ca3af", marginTop:2 }}>{e.date} · {payer?.name} paid · ${per}/person</div>
                  </div>
                  <div style={{ textAlign:"right", flexShrink:0 }}>
                    <div style={{ fontWeight:700, color:"#1f2937", fontSize:14 }}>${e.amount}</div>
                    <div style={{ fontSize:11, color:"#9ca3af" }}>{e.splitWithIds.length} people</div>
                  </div>
                  <button onClick={()=>setExpenses(expenses.filter(x=>x.id!==e.id))} style={{ background:"none", border:"none", cursor:"pointer", color:"#d1d5db", fontSize:16, padding:4, flexShrink:0 }}>🗑</button>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── ITINERARY TAB ───────────────────────────────────────────────────────────

    function ItineraryTab({ itinerary }) {
      const [expanded, setExpanded] = useState(1);
      return (
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {itinerary.map(day=>(
            <div key={day.id} style={{ background:"#fff", borderRadius:20, border:"1px solid #f3f4f6", overflow:"hidden" }}>
              <button onClick={()=>setExpanded(expanded===day.id?null:day.id)}
                style={{ width:"100%", display:"flex", alignItems:"center", gap:12, padding:"14px 16px", background:"none", border:"none", cursor:"pointer", textAlign:"left" }}>
                <span style={{ fontSize:22 }}>{day.emoji}</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:700, color:"#1f2937", fontSize:14 }}>{day.day} — {day.city}</div>
                  <div style={{ fontSize:11, color:"#9ca3af", marginTop:1 }}>{day.date} · {day.activities.length} activities</div>
                </div>
                <span style={{ color:"#9ca3af", fontSize:14 }}>{expanded===day.id?"▴":"▾"}</span>
              </button>
              {expanded===day.id && (
                <div style={{ borderTop:"1px solid #f9fafb", padding:"4px 16px 16px" }}>
                  {day.activities.map((act,i)=>(
                    <div key={act.id} style={{ display:"flex", gap:12, paddingTop:14 }}>
                      <div style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
                        <div style={{ fontSize:18 }}>{ACT_EMOJI[act.type]||"📍"}</div>
                        {i<day.activities.length-1 && <div style={{ width:1, flex:1, background:"#f3f4f6", margin:"4px 0" }}/>}
                      </div>
                      <div style={{ flex:1, paddingBottom:4 }}>
                        <div style={{ display:"flex", alignItems:"baseline", gap:8, flexWrap:"wrap" }}>
                          <span style={{ fontSize:11, fontFamily:"monospace", color:"#9ca3af", flexShrink:0 }}>{act.time}</span>
                          <span style={{ fontSize:13, fontWeight:600, color:"#1f2937" }}>{act.title}</span>
                        </div>
                        {act.note && <div style={{ fontSize:11, color:"#6b7280", marginTop:3 }}>{act.note}</div>}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      );
    }

    // ── PLACES TAB ──────────────────────────────────────────────────────────────

    function PlacesTab({ places, setPlaces }) {
      const [cityFilter, setCityFilter] = useState("All");
      const [showVisited, setShowVisited] = useState(false);
      const cities = ["All", ...new Set(places.map(p=>p.city))];
      const filtered = places.filter(p=>(cityFilter==="All"||p.city===cityFilter)&&(showVisited||!p.visited));
      const visitedCount = places.filter(p=>p.visited).length;
      const starredCount = places.filter(p=>p.starred).length;
      const toggle = (id, key) => setPlaces(places.map(p=>p.id===id?{...p,[key]:!p[key]}:p));

      return (
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <div style={{ background:"#fff", borderRadius:20, padding:18, border:"1px solid #f3f4f6" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <div style={{ fontWeight:700, color:"#1f2937", fontSize:15 }}>📍 Places Tracker</div>
              <div style={{ fontSize:13, color:"#6b7280" }}>{visitedCount}/{places.length} visited</div>
            </div>
            <div style={{ background:"#f3f4f6", borderRadius:99, height:8, overflow:"hidden" }}>
              <div style={{ background:"#DC2626", height:"100%", borderRadius:99, width:((visitedCount/places.length)*100)+"%", transition:"width 0.4s" }}/>
            </div>
            <div style={{ display:"flex", gap:16, marginTop:10, fontSize:12, color:"#6b7280" }}>
              <span>⭐ {starredCount} must-see</span>
              <span>✅ {visitedCount} done</span>
              <span>🗺️ {places.length-visitedCount} remaining</span>
            </div>
          </div>

          <div style={{ display:"flex", gap:8, overflowX:"auto", paddingBottom:4 }}>
            {cities.map(c=>(
              <button key={c} onClick={()=>setCityFilter(c)} style={{ padding:"7px 14px", borderRadius:99, fontSize:12, fontWeight:500, border:"1px solid", flexShrink:0, cursor:"pointer", borderColor:cityFilter===c?"#DC2626":"#e5e7eb", background:cityFilter===c?"#DC2626":"#fff", color:cityFilter===c?"#fff":"#374151" }}>{c}</button>
            ))}
            <button onClick={()=>setShowVisited(!showVisited)} style={{ padding:"7px 14px", borderRadius:99, fontSize:12, fontWeight:500, border:"1px solid", flexShrink:0, cursor:"pointer", borderColor:showVisited?"#16a34a":"#e5e7eb", background:showVisited?"#16a34a":"#fff", color:showVisited?"#fff":"#374151" }}>
              {showVisited?"✓ Showing all":"Show visited"}
            </button>
          </div>

          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {filtered.map(place=>(
              <div key={place.id} style={{ background:place.visited?"#f9fafb":"#fff", borderRadius:16, padding:14, border:"1px solid "+(place.visited?"#d1fae5":"#f3f4f6"), opacity:place.visited?0.7:1, transition:"all 0.2s" }}>
                <div style={{ display:"flex", alignItems:"flex-start", gap:12 }}>
                  <span style={{ fontSize:22, marginTop:2 }}>{place.emoji}</span>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                      <span style={{ fontWeight:600, fontSize:14, color:place.visited?"#9ca3af":"#1f2937", textDecoration:place.visited?"line-through":"none" }}>{place.name}</span>
                      <span style={{ fontSize:10, background:"#f3f4f6", color:"#6b7280", padding:"2px 8px", borderRadius:99 }}>{place.city}</span>
                      <span style={{ fontSize:10, background:"#fef9c3", color:"#92400e", padding:"2px 8px", borderRadius:99 }}>{place.category}</span>
                    </div>
                    <div style={{ fontSize:12, color:"#6b7280", marginTop:4 }}>{place.description}</div>
                  </div>
                  <div style={{ display:"flex", gap:8, flexShrink:0 }}>
                    <button onClick={()=>toggle(place.id,"starred")} style={{ background:"none", border:"none", cursor:"pointer", fontSize:16, padding:2, color:place.starred?"#f59e0b":"#d1d5db" }}>
                      {place.starred?"⭐":"☆"}
                    </button>
                    <button onClick={()=>toggle(place.id,"visited")}
                      style={{ width:28, height:28, borderRadius:"50%", border:"2px solid", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, borderColor:place.visited?"#16a34a":"#d1d5db", background:place.visited?"#16a34a":"transparent", color:"#fff", fontSize:12 }}>
                      {place.visited?"✓":""}
                    </button>
                  </div>
                </div>
              </div>
            ))}
            {filtered.length===0 && (
              <div style={{ textAlign:"center", padding:40, color:"#9ca3af", fontSize:13 }}>No places to show. Try adjusting the filters.</div>
            )}
          </div>
        </div>
      );
    }

    // ── MAIN APP ────────────────────────────────────────────────────────────────

    const TABS = [
      { id:"people",    label:"People",    icon:"👥" },
      { id:"itinerary", label:"Itinerary", icon:"📅" },
      { id:"expenses",  label:"Expenses",  icon:"💰" },
      { id:"places",    label:"Places",    icon:"📍" },
    ];

    function App() {
      const [tab, setTab] = useState("itinerary");
      const [people, setPeople] = useState(INITIAL_PEOPLE);
      const [expenses, setExpenses] = useState(INITIAL_EXPENSES);
      const [itinerary] = useState(INITIAL_ITINERARY);
      const [places, setPlaces] = useState(INITIAL_PLACES);

      return (
        <div style={{ minHeight:"100vh", background:"#f9fafb", fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" }}>
          {/* Header */}
          <div style={{ background:"linear-gradient(135deg,#DC2626,#B91C1C)", color:"#fff", padding:"32px 20px 60px" }}>
            <div style={{ maxWidth:520, margin:"0 auto" }}>
              <div style={{ fontSize:13, color:"#fca5a5", marginBottom:6, letterSpacing:1 }}>🇯🇵 SPRING TRIP 2026</div>
              <div style={{ fontSize:32, fontWeight:800, letterSpacing:-0.5 }}>Japan ✦</div>
              <div style={{ fontSize:13, color:"#fca5a5", marginTop:6 }}>Apr 1–10 · Tokyo · Hakone · Kyoto · Osaka</div>
            </div>
          </div>

          {/* Tab bar */}
          <div style={{ maxWidth:520, margin:"-36px auto 0", padding:"0 16px" }}>
            <div style={{ background:"#fff", borderRadius:20, padding:6, display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:4, boxShadow:"0 4px 24px rgba(0,0,0,0.10)" }}>
              {TABS.map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)}
                  style={{ padding:"10px 4px", borderRadius:14, border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, transition:"all 0.15s", background:tab===t.id?"#DC2626":"transparent", color:tab===t.id?"#fff":"#6b7280" }}>
                  <span style={{ fontSize:16 }}>{t.icon}</span>
                  <span style={{ fontSize:11, fontWeight:600 }}>{t.label}</span>
                </button>
              ))}
            </div>
          </div>

          {/* Content */}
          <div style={{ maxWidth:520, margin:"0 auto", padding:"20px 16px 48px" }}>
            {tab==="people"    && <PeopleTab    people={people}     setPeople={setPeople} />}
            {tab==="itinerary" && <ItineraryTab itinerary={itinerary} />}
            {tab==="expenses"  && <ExpensesTab  expenses={expenses} setExpenses={setExpenses} people={people} />}
            {tab==="places"    && <PlacesTab    places={places}     setPlaces={setPlaces} />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
